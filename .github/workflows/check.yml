name: CI Pipeline

on:
  push:
    branches:  main, backend_develop, frontend_develop 
  pull_request:
    branches:  main 
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose --env-file .env build

      - name: Start and wait for services (postgres, translate, frontend)
        run: |
          for service in postgres translate frontend; do
            docker compose --env-file .env up -d $service
            timeout=60
            while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q $service) 2>/dev/null)" != "healthy" ]; do
              if [ $timeout -le 0 ]; then
                echo "Timeout waiting for $service"
                exit 1
              fi
              sleep 2
              timeout=$((timeout-2))
            done
          done

      - name: Prepare reports directory
        run: mkdir -p reports/api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (e2e tests)
        run: npm ci

      - name: Install Playwright browsers (only Chromium)
        run: npx playwright install chromium

      - name: Run API integration tests
        run: |
          docker compose --env-file .env run --rm api pytest tests/test_integration.py -v --junitxml=reports/api/junit.xml

      - name: Run Playwright e2e tests (1 worker, Chromium)
        run: npx playwright test --workers=1 --project=chromium

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            playwright-report/
            test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose --env-file .env down -v
          if [ -f .env ]; then
            shred -u .env 2>/dev/null || rm -f .env
          fi