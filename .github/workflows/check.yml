name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Prepare reports directory
        run: mkdir -p reports/api reports/bot reports/frontend

      # ==================== API Tests ====================
      - name: Run API unit tests
        run: |
          docker compose run --rm api pytest tests/unit/ \
            -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --cov-fail-under=80 \
            --cov-config=/app/.coveragerc \
            --junitxml=/app/reports/junit.xml

      # ==================== Bot Tests ====================
      - name: Run Bot unit tests
        run: |
          docker compose run --rm bot python -m pytest /app/test/test_bot.py \
            -v \
            --cov=. \
            --cov-config=/app/.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --junitxml=/app/reports/junit.xml

      # ==================== Frontend Tests ====================
      - name: Run Frontend unit tests with coverage
        run: docker compose run --rm frontend npm run coverage

      # ==================== Upload test reports as artifacts ====================
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
          retention-days: 7

      # Опционально: публикуем coverage в Codecov (если подключишь)
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: ./reports/coverage.xml
      #     fail_ci_if_error: false