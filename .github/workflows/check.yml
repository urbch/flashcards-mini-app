name: CI Pipeline

on:
  push:
    branches: [ main, backend_develop, frontend_develop ]
  pull_request:
    branches: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker images
        run: |
          docker compose --env-file .env build
      - name: Prepare reports directory
        run: mkdir -p reports/api reports/bot reports/frontend
      - name: Start PostgreSQL and wait for health
        run: |
          docker compose up -d postgres
          while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q postgres))" != "healthy" ]; do
          sleep 2
          done
      # ==================== API Tests ====================
      - name: Run API integration tests
        run: |
          docker compose run --rm api pytest api/tests/test_integration.py -v
      - name: Run API integration tests for bot
        run: |
          docker compose run --rm api pytest api/tests/test_integration_bot.py -v
      # ==================== Bot Tests ====================
      - name: Run Bot unit tests
        run: |
          docker compose --env-file .env run --rm bot python -m pytest /app/test/test_bot.py \
            -v \
            --cov=. \
            --cov-config=/app/.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --junitxml=/app/reports/junit.xml
      # ==================== Frontend Tests ====================
      - name: Run Frontend unit tests
        run: docker compose --env-file .env run --rm frontend npm run coverage

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7
