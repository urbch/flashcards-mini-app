name: CI Pipeline

on:
  push:
    branches: [ main, backend_develop, frontend_develop ]
  pull_request:
    branches: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker images
        run: docker compose --env-file .env build
      - name: Prepare reports directory
        run: mkdir -p reports/api
      - name: Start PostgreSQL and wait for health
        run: |
          docker compose up -d postgres
          while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q postgres))" != "healthy" ]; do
          sleep 2
          done
      - name: Start LibreTranslate and wait for health
        run: |
          docker compose up -d translate
          while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q translate))" != "healthy" ]; do
          sleep 2
          done
      - name: Start frontend and wait for health
        run: |
          docker compose up -d frontend
          while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q frontend))" != "healthy" ]; do
          sleep 2
          done
      - name: Start api and wait for health
        run: |
          docker compose up -d api
          while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api))" != "healthy" ]; do
          sleep 2
          done
      - name: Run API integration tests
        run: |
          sudo docker compose run --rm api pytest tests/test_integration.py -v --junitxml=reports/api/junit.xml
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (e2e tests)
        run: |
          npm ci

      - name: Install Playwright browsers (only Chromium)
        run: |
          npx playwright install chromium

      - name: Run Playwright e2e tests (1 worker, Chromium)
        run: |
          npx playwright test --workers=1 --project=chromium
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7