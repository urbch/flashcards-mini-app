name: CI Pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose --env-file .env build

      - name: Prepare reports directory
        run: mkdir -p reports/api reports/bot reports/frontend
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # ==================== API Tests ====================
      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          EOF

      - name: Run API tests
        run: |
          docker compose --env-file .env run --rm api pytest tests/unit/ \
            -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --cov-fail-under=80 \
            --cov-config=/app/.coveragerc \
            --junitxml=/app/reports/junit.xml

      # ==================== Bot Tests ====================
      - name: Run Bot unit tests
        run: |
          docker compose --env-file .env run --rm bot python -m pytest /app/test/test_bot.py \
            -v \
            --cov=. \
            --cov-config=/app/.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --junitxml=/app/reports/junit.xml

      # ==================== Frontend Tests ====================
      - name: Run Frontend unit tests
        run: docker compose --env-file .env run --rm frontend npm run coverage

      # ==================== Upload reports ====================
  report:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7