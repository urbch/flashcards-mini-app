name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # === Создаём .env файл из секретов ===
      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          EOF

      - name: Show created .env (для отладки — можно потом убрать)
        run: cat .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Prepare reports directory
        run: mkdir -p reports/api reports/bot reports/frontend

      # ==================== API Tests ====================
      - name: Run API tests
        run: |
          docker compose run --rm \
            --env-file .env \
            api pytest tests/unit/ \
              -v \
              --cov=. \
              --cov-report=term-missing \
              --cov-report=html:/app/reports/htmlcov \
              --cov-report=xml:/app/reports/coverage.xml \
              --cov-fail-under=80 \
              --cov-config=/app/.coveragerc \
              --junitxml=/app/reports/junit.xml

      # ==================== Bot Tests ====================
      - name: Run Bot unit tests
        run: |
          docker compose run --rm \
            --env-file .env \
            bot python -m pytest /app/test/test_bot.py \
              -v \
              --cov=. \
              --cov-config=/app/.coveragerc \
              --cov-report=term-missing \
              --cov-report=html:/app/reports/htmlcov \
              --cov-report=xml:/app/reports/coverage.xml \
              --junitxml=/app/reports/junit.xml

      # ==================== Frontend Tests ====================
      - name: Run Frontend unit tests with coverage
        run: docker compose run --rm frontend npm run coverage

      # ==================== Upload test reports ====================
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7