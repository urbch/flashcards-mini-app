name: CI Pipeline

on:
  push:
    branches:  main, backend_develop, frontend_develop 
  pull_request:
    branches:  main 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Build images
        run: docker compose build
      - name: Save images as artifact (optional)
        run: docker save -o images.tar $(docker compose config --images)
      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images.tar
          retention-days: 1

  test-api:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Load Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
      - run: docker load -i images.tar
      - name: Start postgres & translate
        run: docker compose up -d postgres translate --wait --wait-timeout 60
      - name: Run API integration tests
        run: docker compose run --rm -e DATABASE_URL -e BOT_TOKEN api pytest tests/test_integration.py -v --junitxml=reports/api/junit.xml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: reports/api/
      - name: Cleanup
        if: always()
        run: docker compose down -v

  test-e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Load Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
      - run: docker load -i images.tar
      - name: Start all services
        run: docker compose up -d --wait --wait-timeout 60
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Run e2e tests
        run: npx playwright test --workers=1 --project=chromium
      - name: Upload e2e reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: playwright-report/
      - name: Cleanup
        if: always()
        run: docker compose down -v