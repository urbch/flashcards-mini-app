name: CI Pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          EOF

      - name: Show .env (для отладки)
        run: cat .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose --env-file .env build
          docker compose up -d

      - name: Prepare reports directory
        run: mkdir -p reports/api reports/bot reports/frontend

      # ==================== API Tests ====================
      - name: Run API tests
        run: |
          docker compose --env-file .env run --rm api pytest tests/unit/ \
            -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --cov-fail-under=80 \
            --cov-config=/app/.coveragerc \
            --junitxml=/app/reports/junit.xml

      # ==================== Bot Tests ====================
      - name: Run Bot unit tests
        run: |
          docker compose --env-file .env run --rm bot python -m pytest /app/test/test_bot.py \
            -v \
            --cov=. \
            --cov-config=/app/.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --junitxml=/app/reports/junit.xml

      # ==================== Frontend Tests ====================
      - name: Run Frontend unit tests
        run: docker compose --env-file .env run --rm frontend npm run coverage

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    services:
      # Опционально: если используете базу данных для e2e тестов
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4  # Обновил до v4
        with:
          node-version: 20
          cache: 'npm'  # Добавил кэширование

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium  # Устанавливаем только нужный браузер

      - name: Start application server
        run: |
          # Запускаем сервер в фоновом режиме
          npm run dev &  # или npm start, в зависимости от вашего проекта
          # Ждем, пока сервер запустится
          npx wait-on http://localhost:5173 --timeout 60000 --verbose
        env:
          TEST_MODE: true
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
          # Добавьте другие переменные окружения

      - name: Run Playwright tests
        run: npx playwright test --workers=2 --reporter=list --trace on  # Добавил trace для отладки
        env:
          CI: true  # Важно для Playwright в CI среде

      - name: Upload Playwright report
        if: always()  # Загружаем отчет даже при падении тестов
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7