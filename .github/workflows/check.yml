name: CI Pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          EOF
      - name: Show .env (для отладки)
        run: cat .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose --env-file .env build
      - name: Prepare reports directory
        run: mkdir -p reports/api reports/bot reports/frontend

      # ==================== API Tests ====================
      - name: Run API tests
        run: |
          docker compose run --rm api pytest api/tests/ -v
      # ==================== Bot Tests ====================
      - name: Run Bot unit tests
        run: |
          docker compose --env-file .env run --rm bot python -m pytest /app/test/test_bot.py \
            -v \
            --cov=. \
            --cov-config=/app/.coveragerc \
            --cov-report=term-missing \
            --cov-report=html:/app/reports/htmlcov \
            --cov-report=xml:/app/reports/coverage.xml \
            --junitxml=/app/reports/junit.xml
      # ==================== Frontend Tests ====================
      - name: Run Frontend unit tests
        run: docker compose --env-file .env run --rm frontend npm run coverage

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 7