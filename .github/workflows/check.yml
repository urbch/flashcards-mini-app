name: CI Pipeline

on:
  push:
    branches:  main, backend_develop, frontend_develop 
  pull_request:
    branches:  main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker images
        run: |
          docker compose build
          # (опционально) помечаем образы, чтобы избежать конфликта имён
          docker compose images -q | xargs docker image inspect > /dev/null

      - name: Start all services and wait for health
        run: docker compose up -d --wait --wait-timeout 60

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (e2e tests)
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright browsers (only Chromium)
        run: npx playwright install chromium

      - name: Prepare reports directory
        run: mkdir -p reports/api

      - name: Run API integration tests
        run: |
          docker compose run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -e BOT_TOKEN="$BOT_TOKEN" \
            api pytest tests/test_integration.py -v --junitxml=reports/api/junit.xml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Run Playwright e2e tests (1 worker, Chromium)
        run: npx playwright test --workers=1 --project=chromium

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            playwright-report/
            test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v